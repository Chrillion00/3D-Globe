<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WORLDVIEW – CLASSIFIED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet"
    href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: #000; color: #00ff88;
      font-family: 'Share Tech Mono', monospace;
    }
    #cesiumContainer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
    #scanlines {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 20;
      background: repeating-linear-gradient(to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
    }
    #vignette {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 19;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.9) 100%);
    }
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 30;
      padding: 8px 16px; display: flex; justify-content: space-between; align-items: center;
      background: rgba(0,0,0,0.8); border-bottom: 1px solid #00ff8844;
      backdrop-filter: blur(6px);
    }
    .logo { font-size: 18px; letter-spacing: 6px; color: #00ff88; text-shadow: 0 0 10px #00ff88, 0 0 30px #00ff8855; }
    .classified { font-size: 11px; color: #ff3333; letter-spacing: 4px; text-shadow: 0 0 8px #ff3333; animation: blink 1.4s step-start infinite; }
    .clock { font-size: 13px; color: #00ff88aa; letter-spacing: 2px; }
    @keyframes blink { 50% { opacity: 0; } }
    #ui {
      position: absolute; top: 52px; left: 12px; z-index: 30;
      width: 250px; padding: 12px;
      background: rgba(0,0,0,0.8); border: 1px solid #00ff8833;
      border-radius: 4px; backdrop-filter: blur(8px);
      box-shadow: 0 0 20px #00ff8822;
    }
    .section-title {
      font-size: 10px; letter-spacing: 3px; color: #00ff8888;
      border-bottom: 1px solid #00ff8822; padding-bottom: 4px; margin-bottom: 8px;
    }
    .spy-btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; margin-top: 5px; padding: 6px 10px;
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      letter-spacing: 1px; cursor: pointer; text-align: left;
      background: transparent; border: 1px solid #00ff8833;
      border-radius: 2px; transition: all 0.2s;
    }
    .spy-btn .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: #00ff8855; border: 1px solid #00ff88;
    }
    .spy-btn.active .dot { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
    .spy-btn.active { border-color: #00ff8888; color: #00ff88; }
    .spy-btn:not(.active) { color: #00ff8877; }
    .spy-btn:hover { background: #00ff8811; border-color: #00ff8866; color: #00ff88; }
    #status { margin-top: 10px; font-size: 10px; color: #00ff8888; min-height: 36px; line-height: 1.7; }
    #bottombar {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
      padding: 5px 16px; display: flex; justify-content: space-between;
      background: rgba(0,0,0,0.8); border-top: 1px solid #00ff8822;
      font-size: 10px; color: #00ff8866; letter-spacing: 2px;
    }
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 36px; height: 36px; pointer-events: none; z-index: 25; opacity: 0.4;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: #00ff88;
    }
    #crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
    #crosshair::after { height: 1px; width: 100%; top: 50%; left: 0; }

    /* Webcam popup */
    #camPopup {
      display: none; position: fixed; z-index: 50;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 560px; max-width: 95vw;
      background: #000; border: 1px solid #00ff8844;
      border-radius: 4px; padding: 12px;
      box-shadow: 0 0 30px #00ff8833;
    }
    #camPopup h3 { margin: 0 0 8px; font-size: 12px; letter-spacing: 3px; color: #00ff88; }
    #camPopup iframe { width: 100%; height: 300px; border: none; }
    #camClose {
      margin-top: 8px; padding: 5px 12px; cursor: pointer;
      background: transparent; border: 1px solid #00ff8844;
      color: #00ff88; font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 2px;
    }
    #camClose:hover { background: #00ff8811; }
    .cesium-widget-credits { display: none !important; }
  </style>
</head>
<body>

<div id="cesiumContainer"></div>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="crosshair"></div>

<div id="topbar">
  <div class="logo">◈ WORLDVIEW</div>
  <div class="classified">⚠ TOP SECRET / CLASSIFIED</div>
  <div class="clock" id="clock">--:--:-- UTC</div>
</div>

<div id="ui">
  <div class="section-title">▸ INTEL FEEDS</div>
  <button class="spy-btn active" id="btnQuakes"><span class="dot"></span> SEISMIC ACTIVITY</button>
  <button class="spy-btn" id="btnFires"><span class="dot"></span> WILDFIRE HOTSPOTS</button>
  <button class="spy-btn" id="btnISS"><span class="dot"></span> ISS TRACKER</button>
  <button class="spy-btn" id="btnCams"><span class="dot"></span> PUBLIC WEBCAMS</button>
  <button class="spy-btn" id="btnLocate"><span class="dot"></span> LOCATE OPERATOR</button>
  <div id="status">SYSTEM READY.</div>

  <div class="section-title" style="margin-top:12px;">▸ LEGEND</div>
  <div style="font-size:10px; line-height:2; color:#00ff8866;">
    <span style="color:#00ff88">●</span> MINOR QUAKE (M&lt;3)<br/>
    <span style="color:#ffaa00">●</span> MODERATE (M3–5)<br/>
    <span style="color:#ff3333">●</span> MAJOR (M5+)<br/>
    <span style="color:#ff6600">●</span> WILDFIRE HOTSPOT<br/>
    <span style="color:#ffffff">●</span> ISS POSITION<br/>
    <span style="color:#00ccff">◈</span> PUBLIC WEBCAM
  </div>
</div>

<div id="bottombar">
  <span id="coords">LAT: ------ LON: ------</span>
  <span>WORLDVIEW SURVEILLANCE SYSTEM v3.0</span>
  <span id="countBar">EVENTS: --</span>
</div>

<!-- Webcam popup -->
<div id="camPopup">
  <h3 id="camTitle">WEBCAM FEED</h3>
  <iframe id="camFrame" src="" allowfullscreen></iframe>
  <br/>
  <button id="camClose">✕ CLOSE FEED</button>
</div>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
<script>
  window.CESIUM_BASE_URL = "https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/";

  // ── Clock ────────────────────────────────────────────────────
  function updateClock() {
    const n = new Date();
    document.getElementById("clock").textContent =
      String(n.getUTCHours()).padStart(2,'0') + ":" +
      String(n.getUTCMinutes()).padStart(2,'0') + ":" +
      String(n.getUTCSeconds()).padStart(2,'0') + " UTC";
  }
  setInterval(updateClock, 1000); updateClock();

  // ── Viewer ───────────────────────────────────────────────────
  const viewer = new Cesium.Viewer("cesiumContainer", {
    animation: false, timeline: false, baseLayerPicker: false,
    geocoder: false, homeButton: false, sceneModePicker: false,
    navigationHelpButton: false, infoBox: false, selectionIndicator: false,
    imageryProvider: new Cesium.UrlTemplateImageryProvider({
      url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
      minimumLevel: 0, maximumLevel: 19,
      credit: "© OpenStreetMap contributors"
    })
  });

  viewer.scene.globe.enableLighting = true;
  viewer.scene.backgroundColor = Cesium.Color.BLACK;
  const layer = viewer.scene.globe.imageryLayers.get(0);
  layer.hue = 0.35; layer.saturation = 0.3; layer.brightness = 0.5;

  viewer.scene.skyBox = new Cesium.SkyBox({ sources: {
    positiveX: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_px.jpg"),
    negativeX: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_mx.jpg"),
    positiveY: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_py.jpg"),
    negativeY: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_my.jpg"),
    positiveZ: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_pz.jpg"),
    negativeZ: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_mz.jpg"),
  }});

  viewer.camera.changed.addEventListener(() => {
    const c = viewer.camera.positionCartographic;
    document.getElementById("coords").textContent =
      "LAT: " + Cesium.Math.toDegrees(c.latitude).toFixed(4) +
      "  LON: " + Cesium.Math.toDegrees(c.longitude).toFixed(4);
  });

  const statusEl = document.getElementById("status");

  // ── 1. EARTHQUAKES ───────────────────────────────────────────
  let quakeDS = null, quakesOn = true;

  async function loadEarthquakes() {
    if (quakeDS) { viewer.dataSources.remove(quakeDS, true); quakeDS = null; }
    if (!quakesOn) return;
    statusEl.textContent = "► FETCHING SEISMIC DATA...";
    const url = "https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&orderby=time&starttime=" +
      new Date(Date.now() - 24 * 3600000).toISOString();
    try {
      const res = await fetch(url);
      const geojson = await res.json();
      quakeDS = await Cesium.GeoJsonDataSource.load(geojson, { clampToGround: true });
      viewer.dataSources.add(quakeDS);
      const entities = quakeDS.entities.values;
      for (const e of entities) {
        const mag = e.properties?.mag?.getValue() || 0;
        const size = 4 + mag * 2.5;
        const color = mag >= 5 ? Cesium.Color.fromCssColorString("#ff3333")
          : mag >= 3 ? Cesium.Color.fromCssColorString("#ffaa00")
          : Cesium.Color.fromCssColorString("#00ff88");
        e.point = new Cesium.PointGraphics({
          pixelSize: size, color: color.withAlpha(0.9),
          outlineColor: color.withAlpha(0.25), outlineWidth: size * 0.8,
        });
        e.label = new Cesium.LabelGraphics({
          text: "M" + mag.toFixed(1), font: "10px 'Share Tech Mono', monospace",
          fillColor: color, showBackground: true,
          backgroundColor: Cesium.Color.BLACK.withAlpha(0.7),
          verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
          pixelOffset: new Cesium.Cartesian2(0, -size - 6), scale: 0.85,
        });
      }
      statusEl.textContent = "✔ " + entities.length + " SEISMIC EVENTS";
      document.getElementById("countBar").textContent = "EVENTS: " + entities.length;
    } catch(e) { statusEl.textContent = "✘ SEISMIC FEED ERROR"; }
  }

  document.getElementById("btnQuakes").addEventListener("click", () => {
    quakesOn = !quakesOn;
    document.getElementById("btnQuakes").classList.toggle("active", quakesOn);
    quakesOn ? loadEarthquakes() : (quakeDS && viewer.dataSources.remove(quakeDS, true) && (quakeDS = null));
  });
  loadEarthquakes();

  // ── 2. NASA WILDFIRES (EONET – no key needed) ────────────────
  let fireEntities = [], firesOn = false;

  async function loadFires() {
    for (const e of fireEntities) viewer.entities.remove(e);
    fireEntities = [];
    if (!firesOn) return;
    statusEl.textContent = "► FETCHING WILDFIRE DATA...";
    try {
      const res = await fetch("https://eonet.gsfc.nasa.gov/api/v3/events?category=wildfires&status=open&limit=200");
      const data = await res.json();
      for (const event of data.events) {
        for (const geo of event.geometry) {
          if (geo.type !== "Point") continue;
          const [lon, lat] = geo.coordinates;
          const e = viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(lon, lat),
            point: {
              pixelSize: 7,
              color: Cesium.Color.fromCssColorString("#ff6600").withAlpha(0.95),
              outlineColor: Cesium.Color.fromCssColorString("#ff3300").withAlpha(0.3),
              outlineWidth: 8,
            },
            label: {
              text: "🔥",
              font: "14px sans-serif",
              verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
              pixelOffset: new Cesium.Cartesian2(0, -14),
              disableDepthTestDistance: Number.POSITIVE_INFINITY,
            },
            description: event.title,
          });
          fireEntities.push(e);
        }
      }
      statusEl.textContent = "✔ " + fireEntities.length + " WILDFIRE HOTSPOTS";
    } catch(e) { statusEl.textContent = "✘ FIRE FEED ERROR"; }
  }

  document.getElementById("btnFires").addEventListener("click", () => {
    firesOn = !firesOn;
    document.getElementById("btnFires").classList.toggle("active", firesOn);
    loadFires();
  });

  // ── 3. ISS TRACKER ───────────────────────────────────────────
  let issEntity = null, issOn = false, issInterval = null;

  async function updateISS() {
    try {
      const res = await fetch("https://api.wheretheiss.at/v1/satellites/25544");
      const d = await res.json();
      const pos = Cesium.Cartesian3.fromDegrees(d.longitude, d.latitude, d.altitude * 1000);
      if (!issEntity) {
        issEntity = viewer.entities.add({
          position: pos,
          point: { pixelSize: 10, color: Cesium.Color.WHITE, outlineColor: Cesium.Color.WHITE.withAlpha(0.3), outlineWidth: 10 },
          label: {
            text: "◈ ISS",
            font: "11px 'Share Tech Mono', monospace",
            fillColor: Cesium.Color.WHITE,
            showBackground: true,
            backgroundColor: Cesium.Color.BLACK.withAlpha(0.8),
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            pixelOffset: new Cesium.Cartesian2(0, -22),
          }
        });
      } else {
        issEntity.position = new Cesium.ConstantPositionProperty(pos);
      }
      statusEl.textContent =
        "✔ ISS: " + d.latitude.toFixed(2) + "N " + d.longitude.toFixed(2) + "E\n" +
        "ALT: " + Math.round(d.altitude) + " KM  VEL: " + Math.round(d.velocity) + " KM/H";
    } catch(e) { statusEl.textContent = "✘ ISS FEED ERROR"; }
  }

  document.getElementById("btnISS").addEventListener("click", () => {
    issOn = !issOn;
    document.getElementById("btnISS").classList.toggle("active", issOn);
    if (issOn) {
      updateISS();
      issInterval = setInterval(updateISS, 5000);
    } else {
      clearInterval(issInterval);
      if (issEntity) { viewer.entities.remove(issEntity); issEntity = null; }
    }
  });

  // ── 4. PUBLIC WEBCAMS (Windy/OpenStreetCam sample set) ───────
  // A curated list of public embeddable webcams around the world
  const PUBLIC_CAMS = [
    { name: "Times Square NYC", lat: 40.7580, lon: -73.9855, embed: "https://www.earthcam.com/usa/newyork/timessquare/?cam=tsrobo1" },
    { name: "Eiffel Tower Paris", lat: 48.8584, lon: 2.2945, embed: "https://www.earthcam.com/world/france/paris/?cam=eiffeltower_gigapixel" },
    { name: "Sydney Harbour", lat: -33.8568, lon: 151.2153, embed: "https://www.earthcam.com/world/australia/sydney/?cam=sydney" },
    { name: "Tokyo Shibuya", lat: 35.6598, lon: 139.7004, embed: "https://www.earthcam.com/world/japan/tokyo/?cam=shibuya" },
    { name: "Niagara Falls", lat: 43.0799, lon: -79.0747, embed: "https://www.earthcam.com/usa/newyork/niagarafalls/?cam=niagarafalls_hd" },
    { name: "Las Vegas Strip", lat: 36.1147, lon: -115.1728, embed: "https://www.earthcam.com/usa/nevada/lasvegas/?cam=bellagio_hd" },
    { name: "Miami Beach", lat: 25.7907, lon: -80.1300, embed: "https://www.earthcam.com/usa/florida/miamibeach/?cam=oceandriveday" },
    { name: "Grand Canyon", lat: 36.0544, lon: -112.1401, embed: "https://www.earthcam.com/usa/arizona/grandcanyon/?cam=grandcanyon" },
    { name: "Prague Old Town", lat: 50.0874, lon: 14.4213, embed: "https://www.earthcam.com/world/czech/prague/?cam=prague" },
    { name: "Trafalgar Square London", lat: 51.5080, lon: -0.1281, embed: "https://www.earthcam.com/world/england/london/?cam=london" },
    { name: "Venice Canal Italy", lat: 45.4408, lon: 12.3155, embed: "https://www.earthcam.com/world/italy/venice/?cam=stmarks" },
    { name: "Yellowstone", lat: 44.4280, lon: -110.5885, embed: "https://www.nps.gov/features/yell/webcam/oldFaithfulStreaming.html" },
    { name: "Stockholm City", lat: 59.3293, lon: 18.0686, embed: "https://www.earthcam.com/world/sweden/stockholm/?cam=stockholm" },
  ];

  let camEntities = [], camsOn = false;

  function loadCams() {
    for (const e of camEntities) viewer.entities.remove(e);
    camEntities = [];
    if (!camsOn) return;
    for (const cam of PUBLIC_CAMS) {
      const e = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(cam.lon, cam.lat),
        point: {
          pixelSize: 9,
          color: Cesium.Color.fromCssColorString("#00ccff").withAlpha(0.9),
          outlineColor: Cesium.Color.fromCssColorString("#00ccff").withAlpha(0.25),
          outlineWidth: 10,
        },
        label: {
          text: "◈ " + cam.name.toUpperCase(),
          font: "10px 'Share Tech Mono', monospace",
          fillColor: Cesium.Color.fromCssColorString("#00ccff"),
          showBackground: true,
          backgroundColor: Cesium.Color.BLACK.withAlpha(0.75),
          verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
          pixelOffset: new Cesium.Cartesian2(0, -20),
          distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 5000000),
        },
        properties: { embed: cam.embed, name: cam.name }
      });
      camEntities.push(e);
    }
    statusEl.textContent = "✔ " + camEntities.length + " WEBCAMS ONLINE\nCLICK MARKER TO VIEW";
  }

  document.getElementById("btnCams").addEventListener("click", () => {
    camsOn = !camsOn;
    document.getElementById("btnCams").classList.toggle("active", camsOn);
    loadCams();
  });

  // Click handler for webcam popups
  const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  handler.setInputAction((click) => {
    const picked = viewer.scene.pick(click.position);
    if (Cesium.defined(picked) && picked.id && picked.id.properties) {
      const embed = picked.id.properties.embed?.getValue();
      const name = picked.id.properties.name?.getValue();
      if (embed) {
        document.getElementById("camTitle").textContent = "◈ LIVE FEED: " + name.toUpperCase();
        document.getElementById("camFrame").src = embed;
        document.getElementById("camPopup").style.display = "block";
      }
    }
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

  document.getElementById("camClose").addEventListener("click", () => {
    document.getElementById("camPopup").style.display = "none";
    document.getElementById("camFrame").src = "";
  });

  // ── 5. LOCATE OPERATOR ───────────────────────────────────────
  let myMarker = null;
  document.getElementById("btnLocate").addEventListener("click", () => {
    if (!navigator.geolocation) { statusEl.textContent = "✘ GEOLOCATION UNAVAILABLE"; return; }
    document.getElementById("btnLocate").classList.add("active");
    statusEl.textContent = "► TRIANGULATING POSITION...";
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude, lon = pos.coords.longitude;
        if (myMarker) viewer.entities.remove(myMarker);
        myMarker = viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(lon, lat),
          point: { pixelSize: 10, color: Cesium.Color.CYAN, outlineColor: Cesium.Color.CYAN.withAlpha(0.3), outlineWidth: 14 },
          label: {
            text: "◈ OPERATOR",
            font: "11px 'Share Tech Mono', monospace",
            fillColor: Cesium.Color.CYAN, showBackground: true,
            backgroundColor: Cesium.Color.BLACK.withAlpha(0.8),
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            pixelOffset: new Cesium.Cartesian2(0, -26),
          }
        });
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(lon, lat, 200000), duration: 3
        });
        statusEl.textContent = "✔ OPERATOR LOCATED\n" + lat.toFixed(5) + " N  " + lon.toFixed(5) + " E";
      },
      (err) => { statusEl.textContent = "✘ SIGNAL LOST: " + err.message; }
    );
  });

</script>
</body>
</html>
