<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Live Globe – Earthquakes Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- CesiumJS CSS (uses public CDN) -->
  <link
    rel="stylesheet"
    href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
    }
    #cesiumContainer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 6px;
      backdrop-filter: blur(6px);
      z-index: 10;
      max-width: 260px;
      font-size: 14px;
    }
    #ui h1 {
      font-size: 16px;
      margin: 0 0 6px;
    }
    #ui button {
      margin-top: 6px;
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    #status {
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.8;
    }
    a {
      color: #9cf;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <div id="ui">
    <h1>Live Globe</h1>
    <div>
      Earthquakes from USGS (last 24h).<br/>
      Click “Reload” to refresh markers.
    </div>
    <button id="reloadBtn">Reload earthquakes</button>
    <div id="status">Idle</div>
    <div style="margin-top:8px; font-size:11px; opacity:0.7;">
      Data: USGS GeoJSON feed<br/>
      Globe: CesiumJS
    </div>
  </div>

  <!-- CesiumJS JS (public CDN) -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>

  <script>
    // 1. Setup Cesium Viewer
    window.CESIUM_BASE_URL = "https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/";

    const viewer = new Cesium.Viewer("cesiumContainer", {
      animation: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: true,
      sceneModePicker: false,
      navigationHelpButton: false,
      infoBox: false,
      selectionIndicator: false,
    });

    // Optional: dark-ish globe look
    viewer.scene.globe.enableLighting = true;
    viewer.scene.skyBox = new Cesium.SkyBox({
      sources: {
        positiveX: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_px.jpg"),
        negativeX: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_mx.jpg"),
        positiveY: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_py.jpg"),
        negativeY: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_my.jpg"),
        positiveZ: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_pz.jpg"),
        negativeZ: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_mz.jpg"),
      }
    });

    // 2. Earthquake layer (USGS – no API key needed)
    // Example USGS GeoJSON feed: last 24 hours, all magnitudes.[web:49][web:55]
    const USGS_URL =
      "https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&orderby=time&starttime=" +
      new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();

    const statusEl = document.getElementById("status");
    const reloadBtn = document.getElementById("reloadBtn");

    let quakeDataSource = null;

    async function loadEarthquakes() {
      try {
        statusEl.textContent = "Loading earthquakes...";
        // Remove old layer if present
        if (quakeDataSource) {
          viewer.dataSources.remove(quakeDataSource, true);
          quakeDataSource = null;
        }

        const res = await fetch(USGS_URL);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const geojson = await res.json();

        // Load as Cesium GeoJsonDataSource
        quakeDataSource = await Cesium.GeoJsonDataSource.load(geojson, {
          clampToGround: true,
        });
        viewer.dataSources.add(quakeDataSource);

        // Style: marker size and color by magnitude
        const entities = quakeDataSource.entities.values;
        for (let i = 0; i < entities.length; i++) {
          const e = entities[i];
          const mag = e.properties && e.properties.mag ? e.properties.mag.getValue() : 0.0;

          const size = 4 + (mag || 0) * 2;
          const color = mag >= 5
            ? Cesium.Color.RED
            : mag >= 3
              ? Cesium.Color.ORANGE
              : Cesium.Color.YELLOW;

          e.point = new Cesium.PointGraphics({
            pixelSize: size,
            color: color.withAlpha(0.9),
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 1,
          });

          e.label = new Cesium.LabelGraphics({
            text: (mag ? mag.toFixed(1) : "?") + "",
            font: "12px sans-serif",
            fillColor: Cesium.Color.WHITE,
            showBackground: true,
            backgroundColor: Cesium.Color.BLACK.withAlpha(0.6),
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            pixelOffset: new Cesium.Cartesian2(0, -size - 6),
            scale: 0.7,
          });
        }

        // Focus camera on layer
        if (entities.length > 0) {
          viewer.flyTo(quakeDataSource, { duration: 2.5 });
        }

        statusEl.textContent = "Loaded " + entities.length + " earthquakes (last 24h).";
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error loading earthquakes: " + err.message;
      }
    }

    reloadBtn.addEventListener("click", loadEarthquakes);

    // Initial load
    loadEarthquakes();
  </script>
</body>
</html>
