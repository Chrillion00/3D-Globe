<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WORLDVIEW – CLASSIFIED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet"
    href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      color: #00ff88;
      font-family: 'Share Tech Mono', monospace;
    }

    #cesiumContainer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }

    /* Scanline overlay */
    #scanlines {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 20;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.15) 3px,
        rgba(0, 0, 0, 0.15) 4px
      );
    }

    /* Vignette overlay */
    #vignette {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 19;
      background: radial-gradient(ellipse at center,
        transparent 60%,
        rgba(0,0,0,0.85) 100%);
    }

    /* Top bar */
    #topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 30;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.75);
      border-bottom: 1px solid #00ff8844;
      backdrop-filter: blur(6px);
    }

    #topbar .logo {
      font-size: 18px;
      letter-spacing: 6px;
      color: #00ff88;
      text-shadow: 0 0 10px #00ff88, 0 0 30px #00ff8855;
    }

    #topbar .classified {
      font-size: 11px;
      color: #ff3333;
      letter-spacing: 4px;
      text-shadow: 0 0 8px #ff3333;
      animation: blink 1.4s step-start infinite;
    }

    #topbar .clock {
      font-size: 13px;
      color: #00ff88aa;
      letter-spacing: 2px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Side panel */
    #ui {
      position: absolute;
      top: 52px; left: 12px;
      z-index: 30;
      width: 240px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid #00ff8833;
      border-radius: 4px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 20px #00ff8822, inset 0 0 20px #00000055;
    }

    .section-title {
      font-size: 10px;
      letter-spacing: 3px;
      color: #00ff8888;
      border-bottom: 1px solid #00ff8833;
      padding-bottom: 4px;
      margin-bottom: 8px;
    }

    .spy-btn {
      display: block;
      width: 100%;
      margin-top: 6px;
      padding: 7px 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      color: #00ff88;
      background: transparent;
      border: 1px solid #00ff8866;
      border-radius: 2px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }

    .spy-btn:hover {
      background: #00ff8822;
      border-color: #00ff88;
      box-shadow: 0 0 10px #00ff8844;
    }

    .spy-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #status {
      margin-top: 10px;
      font-size: 11px;
      color: #00ff8899;
      min-height: 32px;
      line-height: 1.5;
    }

    /* Bottom bar */
    #bottombar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 30;
      padding: 6px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.75);
      border-top: 1px solid #00ff8822;
      backdrop-filter: blur(4px);
      font-size: 10px;
      color: #00ff8866;
      letter-spacing: 2px;
    }

    /* Crosshair center */
    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px;
      pointer-events: none;
      z-index: 25;
      opacity: 0.5;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: #00ff88;
    }
    #crosshair::before {
      width: 1px; height: 100%;
      left: 50%; top: 0;
    }
    #crosshair::after {
      height: 1px; width: 100%;
      top: 50%; left: 0;
    }

    /* Hide Cesium default credit */
    .cesium-widget-credits { display: none !important; }
  </style>
</head>
<body>

  <div id="cesiumContainer"></div>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="crosshair"></div>

  <!-- Top bar -->
  <div id="topbar">
    <div class="logo">◈ WORLDVIEW</div>
    <div class="classified">⚠ TOP SECRET / CLASSIFIED</div>
    <div class="clock" id="clock">--:--:-- UTC</div>
  </div>

  <!-- Side panel -->
  <div id="ui">
    <div class="section-title">▸ INTEL FEEDS</div>
    <button class="spy-btn" id="reloadBtn">⬡ SEISMIC ACTIVITY</button>
    <button class="spy-btn" id="locateMeBtn">◎ LOCATE OPERATOR</button>
    <div id="status">SYSTEM READY.</div>

    <div class="section-title" style="margin-top:14px;">▸ SYSTEM</div>
    <div style="font-size:10px; color:#00ff8855; line-height:1.8;">
      FEED: USGS GEOJSON<br/>
      RENDER: CESIUMJS 1.120<br/>
      MAP: OPENSTREETMAP<br/>
      ENCRYPT: TLS 1.3
    </div>
  </div>

  <!-- Bottom bar -->
  <div id="bottombar">
    <span id="coords">LAT: ------ LON: ------</span>
    <span>WORLDVIEW SURVEILLANCE SYSTEM v2.6</span>
    <span id="quakeCount">EVENTS: --</span>
  </div>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>

  <script>
    window.CESIUM_BASE_URL = "https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/";

    // ── Clock ─────────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      const h = String(now.getUTCHours()).padStart(2,'0');
      const m = String(now.getUTCMinutes()).padStart(2,'0');
      const s = String(now.getUTCSeconds()).padStart(2,'0');
      document.getElementById("clock").textContent = h + ":" + m + ":" + s + " UTC";
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── Cesium viewer ─────────────────────────────────────────────
    const viewer = new Cesium.Viewer("cesiumContainer", {
      animation: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      infoBox: false,
      selectionIndicator: false,
      imageryProvider: new Cesium.UrlTemplateImageryProvider({
        url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        minimumLevel: 0,
        maximumLevel: 19,
        credit: "© OpenStreetMap contributors"
      })
    });

    // Dark tint over the globe
    viewer.scene.globe.enableLighting = true;
    viewer.scene.backgroundColor = Cesium.Color.BLACK;

    // Apply green tint to the imagery
    viewer.scene.globe.imageryLayers.get(0).colorToAlpha = Cesium.Color.WHITE;
    viewer.scene.globe.imageryLayers.get(0).hue = 0.35;
    viewer.scene.globe.imageryLayers.get(0).saturation = 0.3;
    viewer.scene.globe.imageryLayers.get(0).brightness = 0.5;

    viewer.scene.skyBox = new Cesium.SkyBox({
      sources: {
        positiveX: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_px.jpg"),
        negativeX: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_mx.jpg"),
        positiveY: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_py.jpg"),
        negativeY: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_my.jpg"),
        positiveZ: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_pz.jpg"),
        negativeZ: Cesium.buildModuleUrl("Assets/Textures/SkyBox/tycho2t3_80_mz.jpg"),
      }
    });

    // Show lat/lon of camera in bottom bar while moving
    viewer.camera.changed.addEventListener(() => {
      const carto = viewer.camera.positionCartographic;
      const lat = Cesium.Math.toDegrees(carto.latitude).toFixed(4);
      const lon = Cesium.Math.toDegrees(carto.longitude).toFixed(4);
      document.getElementById("coords").textContent =
        "LAT: " + lat + "  LON: " + lon;
    });

    // ── Earthquakes ───────────────────────────────────────────────
    const USGS_URL =
      "https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&orderby=time&starttime=" +
      new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();

    const statusEl = document.getElementById("status");
    let quakeDataSource = null;

    async function loadEarthquakes() {
      try {
        statusEl.textContent = "► FETCHING SEISMIC DATA...";
        if (quakeDataSource) {
          viewer.dataSources.remove(quakeDataSource, true);
          quakeDataSource = null;
        }

        const res = await fetch(USGS_URL);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const geojson = await res.json();

        quakeDataSource = await Cesium.GeoJsonDataSource.load(geojson, {
          clampToGround: true,
        });
        viewer.dataSources.add(quakeDataSource);

        const entities = quakeDataSource.entities.values;
        for (let i = 0; i < entities.length; i++) {
          const e = entities[i];
          const mag = e.properties && e.properties.mag
            ? e.properties.mag.getValue() : 0.0;
          const size = 4 + (mag || 0) * 2.5;
          const color = mag >= 5
            ? Cesium.Color.fromCssColorString("#ff3333")
            : mag >= 3
              ? Cesium.Color.fromCssColorString("#ffaa00")
              : Cesium.Color.fromCssColorString("#00ff88");

          e.point = new Cesium.PointGraphics({
            pixelSize: size,
            color: color.withAlpha(0.9),
            outlineColor: color.withAlpha(0.3),
            outlineWidth: size * 0.8,
          });

          e.label = new Cesium.LabelGraphics({
            text: "M" + (mag ? mag.toFixed(1) : "?"),
            font: "11px 'Share Tech Mono', monospace",
            fillColor: color,
            showBackground: true,
            backgroundColor: Cesium.Color.BLACK.withAlpha(0.7),
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            pixelOffset: new Cesium.Cartesian2(0, -size - 8),
            scale: 0.9,
          });
        }

        document.getElementById("quakeCount").textContent =
          "EVENTS: " + entities.length;
        statusEl.textContent =
          "✔ " + entities.length + " SEISMIC EVENTS\nLAST 24H WORLDWIDE";
      } catch (err) {
        console.error(err);
        statusEl.textContent = "✘ ERROR: " + err.message;
      }
    }

    document.getElementById("reloadBtn").addEventListener("click", loadEarthquakes);
    loadEarthquakes();

    // ── Locate operator ───────────────────────────────────────────
    const locateBtn = document.getElementById("locateMeBtn");
    let myMarker = null;

    locateBtn.addEventListener("click", () => {
      if (!navigator.geolocation) {
        statusEl.textContent = "✘ GEOLOCATION UNAVAILABLE";
        return;
      }
      locateBtn.disabled = true;
      locateBtn.textContent = "► ACQUIRING SIGNAL...";
      statusEl.textContent = "► TRIANGULATING POSITION...";

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;

          if (myMarker) viewer.entities.remove(myMarker);

          myMarker = viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(lon, lat),
            point: {
              pixelSize: 10,
              color: Cesium.Color.CYAN,
              outlineColor: Cesium.Color.CYAN.withAlpha(0.3),
              outlineWidth: 14,
            },
            label: {
              text: "◈ OPERATOR",
              font: "12px 'Share Tech Mono', monospace",
              fillColor: Cesium.Color.CYAN,
              showBackground: true,
              backgroundColor: Cesium.Color.BLACK.withAlpha(0.8),
              verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
              pixelOffset: new Cesium.Cartesian2(0, -26),
            }
          });

          viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lon, lat, 200000),
            duration: 3.0
          });

          statusEl.textContent =
            "✔ OPERATOR LOCATED\n" +
            lat.toFixed(5) + " N\n" +
            lon.toFixed(5) + " E";

          locateBtn.disabled = false;
          locateBtn.textContent = "◎ LOCATE OPERATOR";
        },
        (err) => {
          statusEl.textContent = "✘ SIGNAL LOST: " + err.message;
          locateBtn.disabled = false;
          locateBtn.textContent = "◎ LOCATE OPERATOR";
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });
  </script>
</body>
</html>
